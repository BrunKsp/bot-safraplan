# Sobe tudo localmente para desenvolvimento: Postgres do bot + WAHA + bot-safraplan.
# docker-compose up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bot_safraplan
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # WAHA — gateway que conecta ao WhatsApp de verdade via QR code e expõe uma API HTTP.
  # Documentação: https://waha.devlike.pro (confira lá os nomes exatos das env vars da sua versão)
  waha:
    image: devlikeapro/waha
    ports:
      - "3001:3000"
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_HOOK_URL: http://bot:3000/webhook/whatsapp?token=${WEBHOOK_SECRET}
      WHATSAPP_HOOK_EVENTS: message
      WAHA_PRINT_QR: "true" # imprime o QR code no log do container pra você escanear
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
    volumes:
      - waha_sessions:/app/.sessions

  bot:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bot_user:bot_password@postgres:5432/bot_safraplan
      DATABASE_SSL: "false"
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER}
      WAHA_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_SESSION: default
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      BACKEND_API_URL: ${BACKEND_API_URL}
      WHATSAPP_BOT_SECRET: ${WHATSAPP_BOT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL}
    depends_on:
      - postgres
      - waha
    restart: unless-stopped

volumes:
  postgres_data:
  waha_sessions:
